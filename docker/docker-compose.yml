services:
  mongodb:
    image: docker.io/mongo:8.2.3
    deploy:
      resources:
        limits:
          memory: 256m
    restart: always
    networks:
      default:
        aliases:
          - mongodb
    command: mongod --storageEngine wiredTiger --noscripting
    user: mongodb
    ports:
      - 27017:27017
    environment:
      TZ: Europe/Berlin
    logging:
      options:
        max-size: 50m

  oauth:
    image: ghcr.io/navikt/mock-oauth2-server:2.1.6
    cpus: 0.1
    mem_limit: 64m
    restart: always
    environment:
      PORT: 9900
      LOG_LEVEL: INFO
      JSON_CONFIG: |
          {
            "interactiveLogin": false,
            "httpServer": "NettyWrapper",
            "tokenCallbacks": [
              {
                "issuerId": "ditto",
                "tokenExpiry": 3600,
                "requestMappings": [
                  {
                    "requestParam": "grant_type",
                    "match": "*",
                    "claims": {
                      "sub": "ditto",
                      "aud": ["ditto"]
                    }
                  }
                ]
              }
            ]
          }
    networks:
      default:
        aliases:
          - oauth
    ports:
      - "9900:9900"
    logging:
      options:
        max-size: 10m

  policies:
    image: docker.io/eclipse/ditto-policies:${DITTO_VERSION:-latest}
    deploy:
      resources:
        limits:
          memory: 512m
    restart: always
    networks:
      default:
        aliases:
          - ditto-cluster
    environment:
      TZ: Europe/Berlin
      BIND_HOSTNAME: 0.0.0.0
      # Set additional configuration options here appending JAVA_TOOL_OPTIONS: -Dditto.policies...
      JAVA_TOOL_OPTIONS: >-
        -XX:ActiveProcessorCount=2
        -XX:+ExitOnOutOfMemoryError
        -XX:+UseContainerSupport
        -XX:+UseStringDeduplication
        -Xss512k
        -XX:MaxRAMPercentage=50
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=150
        -Dpekko.coordinated-shutdown.exit-jvm=on
        -Dpekko.cluster.shutdown-after-unsuccessful-join-seed-nodes=180s
        -Dpekko.cluster.failure-detector.threshold=15.0
        -Dpekko.cluster.failure-detector.expected-response-after=10s
        -Dpekko.cluster.failure-detector.acceptable-heartbeat-pause=20s
        -Dpekko.cluster.downing-provider-class=
      MONGO_DB_HOSTNAME: mongodb
      # in order to write logs into a file you can enable this by setting the following env variable
      # the log file(s) can be found in /var/log/ditto directory on the host machine
      # DITTO_LOGGING_FILE_APPENDER: "true"
    # only needed if DITTO_LOGGING_FILE_APPENDER is set
    # volumes:
    #  - ditto_log_files:/var/log/ditto
    healthcheck:
      test: curl --fail `hostname`:7626/alive || exit 1
      interval: 30s
      timeout: 15s
      retries: 4
      start_period: 120s
    logging:
      options:
        max-size: 50m
        
  things:
    image: docker.io/eclipse/ditto-things:${DITTO_VERSION:-latest}
    deploy:
      resources:
        limits:
          memory: 512m
    restart: always
    networks:
      default:
        aliases:
          - ditto-cluster
    depends_on:
      - policies
    environment:
      TZ: Europe/Berlin
      BIND_HOSTNAME: 0.0.0.0
      # Set additional configuration options here appending JAVA_TOOL_OPTIONS: -Dditto.things...
      JAVA_TOOL_OPTIONS: >-
        -XX:ActiveProcessorCount=2
        -XX:+ExitOnOutOfMemoryError
        -XX:+UseContainerSupport
        -XX:+UseStringDeduplication
        -Xss512k
        -XX:MaxRAMPercentage=50
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=150
        -Dpekko.coordinated-shutdown.exit-jvm=on
        -Dpekko.cluster.shutdown-after-unsuccessful-join-seed-nodes=180s
        -Dpekko.cluster.failure-detector.threshold=15.0
        -Dpekko.cluster.failure-detector.expected-response-after=10s
        -Dpekko.cluster.failure-detector.acceptable-heartbeat-pause=20s
        -Dpekko.cluster.downing-provider-class=
      MONGO_DB_HOSTNAME: mongodb
      # in order to write logs into a file you can enable this by setting the following env variable
      # the log file(s) can be found in /var/log/ditto directory on the host machine
      # DITTO_LOGGING_FILE_APPENDER: "true"
    # only needed if DITTO_LOGGING_FILE_APPENDER is set
    # volumes:
    #  - ditto_log_files:/var/log/ditto
    healthcheck:
      test: curl --fail `hostname`:7626/alive || exit 1
      interval: 30s
      timeout: 15s
      retries: 4
      start_period: 120s
    logging:
      options:
        max-size: 50m
        
  things-search:
    image: docker.io/eclipse/ditto-things-search:${DITTO_VERSION:-latest}
    deploy:
      resources:
        limits:
          memory: 512m
    restart: always
    networks:
      default:
        aliases:
          - ditto-cluster
    depends_on:
      - policies
    environment:
      TZ: Europe/Berlin
      BIND_HOSTNAME: 0.0.0.0
      # Set additional configuration options here appending JAVA_TOOL_OPTIONS: -Dditto.search...
      JAVA_TOOL_OPTIONS: >-
        -XX:ActiveProcessorCount=2
        -XX:+ExitOnOutOfMemoryError
        -XX:+UseContainerSupport
        -XX:+UseStringDeduplication
        -Xss512k
        -XX:MaxRAMPercentage=50
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=150
        -Dpekko.coordinated-shutdown.exit-jvm=on
        -Dpekko.cluster.shutdown-after-unsuccessful-join-seed-nodes=180s
        -Dpekko.cluster.failure-detector.threshold=15.0
        -Dpekko.cluster.failure-detector.expected-response-after=10s
        -Dpekko.cluster.failure-detector.acceptable-heartbeat-pause=20s
        -Dpekko.cluster.downing-provider-class=
      MONGO_DB_HOSTNAME: mongodb
      # in order to write logs into a file you can enable this by setting the following env variable
      # the log file(s) can be found in /var/log/ditto directory on the host machine
      # DITTO_LOGGING_FILE_APPENDER: "true"
    # only needed if DITTO_LOGGING_FILE_APPENDER is set
    # volumes:
    #  - ditto_log_files:/var/log/ditto
    healthcheck:
      test: curl --fail `hostname`:7626/alive || exit 1
      interval: 30s
      timeout: 15s
      retries: 4
      start_period: 120s
    logging:
      options:
        max-size: 50m
        
  connectivity:
    image: docker.io/eclipse/ditto-connectivity:${DITTO_VERSION:-latest}
    deploy:
      resources:
        limits:
          memory: 768m
    restart: always
    networks:
      default:
        aliases:
          - ditto-cluster
    depends_on:
      - policies
    environment:
      TZ: Europe/Berlin
      BIND_HOSTNAME: 0.0.0.0
      # if connections to rabbitmq broker are used, you might want to disable ExitOnOutOfMemoryError, because the amqp-client has a bug throwing OOM exceptions and causing a restart loop
      # Set additional configuration options here appending JAVA_TOOL_OPTIONS: -Dditto.connectivity...
      JAVA_TOOL_OPTIONS: >-
        -XX:ActiveProcessorCount=2
        -XX:+ExitOnOutOfMemoryError
        -XX:+UseContainerSupport
        -XX:+UseStringDeduplication
        -Xss512k
        -XX:MaxRAMPercentage=50
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=150
        -Dpekko.coordinated-shutdown.exit-jvm=on
        -Dpekko.cluster.shutdown-after-unsuccessful-join-seed-nodes=180s
        -Dpekko.cluster.failure-detector.threshold=15.0
        -Dpekko.cluster.failure-detector.expected-response-after=10s
        -Dpekko.cluster.failure-detector.acceptable-heartbeat-pause=20s
        -Dpekko.cluster.downing-provider-class=
      MONGO_DB_HOSTNAME: mongodb
      # in order to write logs into a file you can enable this by setting the following env variable
      # the log file(s) can be found in /var/log/ditto directory on the host machine
      # DITTO_LOGGING_FILE_APPENDER: "true"
    # only needed if DITTO_LOGGING_FILE_APPENDER is set
    #volumes:
    #  - ditto_log_files:/var/log/ditto
    healthcheck:
      test: curl --fail `hostname`:7626/alive || exit 1
      interval: 30s
      timeout: 15s
      retries: 4
      start_period: 120s
    logging:
      options:
        max-size: 50m
        
  gateway:
    image: docker.io/eclipse/ditto-gateway:${DITTO_VERSION:-latest}
    deploy:
      resources:
        limits:
          memory: 512m
    restart: always
    networks:
      default:
        aliases:
          - ditto-cluster
    depends_on:
      - policies
      - oauth
    volumes:
      - ./cognito-docdb.jks:/opt/ditto/cognito-docdb.jks:ro
    ports:
      - "8081:8080"
    environment:
      TZ: Europe/Berlin
      BIND_HOSTNAME: 0.0.0.0
      ENABLE_PRE_AUTHENTICATION: "true"
      # Set additional configuration options here appending JAVA_TOOL_OPTIONS: -Dditto.gateway.authentication.devops.password=foobar -Dditto.gateway...
      JAVA_TOOL_OPTIONS: >-
        -XX:ActiveProcessorCount=2
        -XX:+ExitOnOutOfMemoryError
        -XX:+UseContainerSupport
        -XX:+UseStringDeduplication
        -Xss512k
        -XX:MaxRAMPercentage=50
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=150
        -Dpekko.coordinated-shutdown.exit-jvm=on
        -Dpekko.cluster.shutdown-after-unsuccessful-join-seed-nodes=180s
        -Dpekko.cluster.failure-detector.threshold=15.0
        -Dpekko.cluster.failure-detector.expected-response-after=10s
        -Dpekko.cluster.failure-detector.acceptable-heartbeat-pause=20s
        -Dpekko.cluster.downing-provider-class=
        -Djavax.net.ssl.trustStore="/opt/ditto/cognito-docdb.jks"
        -Djavax.net.ssl.trustStorePassword="changeit"
        -Dditto.gateway.authentication.oauth.protocol=http
        -Dditto.gateway.authentication.oauth.openid-connect-issuers.ui.issuer=localhost:8080/ditto
        -Dditto.gateway.authentication.oauth.openid-connect-issuers.ditto.issuer=oauth:9900/ditto
        -Dditto.gateway.authentication.oauth.openid-connect-issuers.ditto.auth-subjects.0="{{ jwt:sub }}"
      # in order to write logs into a file you can enable this by setting the following env variable
      # the log file(s) can be found in /var/log/ditto directory on the host machine
      # DITTO_LOGGING_FILE_APPENDER: "true"
      # You may use the environment for setting the devops password
      # DEVOPS_PASSWORD: foobar
    # only needed if DITTO_LOGGING_FILE_APPENDER is set
    # volumes:
    #  - ditto_log_files:/var/log/ditto
    healthcheck:
      test: curl --fail `hostname`:7626/alive || exit 1
      interval: 30s
      timeout: 15s
      retries: 4
      start_period: 120s
    logging:
      options:
        max-size: 50m
        
  ditto-ui:
    image: docker.io/eclipse/ditto-ui:${DITTO_VERSION:-latest}
    deploy:
      resources:
        limits:
          memory: 32m
    restart: always
    logging:
      options:
        max-size: 10m
        
  swagger-ui:
    image: docker.io/swaggerapi/swagger-ui:v5.9.1
    deploy:
      resources:
        limits:
          memory: 32m
    restart: always
    environment:
      - QUERY_CONFIG_ENABLED=true
    volumes:
       - ./openapi:/usr/share/nginx/html/openapi:ro      
       - ./swagger3-index.html:/usr/share/nginx/html/index.html:ro
       - ./ui-environment.json:/usr/share/nginx/html/ui-environments.json:ro
    command: nginx -g 'daemon off;'  
    logging:
      options:
        max-size: 10m
        
  nginx:
    image: docker.io/nginx:1.27-alpine
    deploy:
      resources:
        limits:
          memory: 32m
    restart: always
    volumes:
       - ./nginx.conf:/etc/nginx/nginx.conf:ro
       - ./nginx.htpasswd:/etc/nginx/nginx.htpasswd:ro
       - ./nginx-cors.conf:/etc/nginx/nginx-cors.conf:ro
       - ./mime.types:/etc/nginx/mime.types:ro
       - ./index.html:/etc/nginx/html/index.html:ro
      #  - ../../documentation/src/main/resources/images:/etc/nginx/html/images:ro
       - ./wot:/etc/nginx/html/wot:ro
    ports:
      - "${DITTO_EXTERNAL_PORT:-8080}:80"
    depends_on:
      - gateway
      - swagger-ui
    logging:
      options:
        max-size: 10m
        
volumes:
  ditto_log_files:
    driver: local
    driver_opts:
      type: none
      device: /var/log/ditto
      o: bind,uid=1000,gid=1000