# ----------------------------------------------------------------------------
# Minimal Eclipse Ditto deployment for Example 10 (direct gateway access).
#
# What's included:
#   - mongodb            persistence
#   - oauth              mock OAuth2 server (acts as the "external" JWT issuer)
#   - policies, things   core Ditto services
#   - gateway            HTTP/WebSocket entry point exposed directly on :8080
#
# What's intentionally NOT included (compared to docker-compose.yml):
#   - nginx        no reverse proxy / HTTP Basic Auth termination
#   - ditto-ui     no browser UI
#   - swagger-ui   no embedded API docs
#   - connectivity / things-search (omitted to keep the footprint minimal;
#                                   example 10 only uses policies + things)
# ----------------------------------------------------------------------------

services:
  mongodb:
    image: docker.io/mongo:8.2.3
    deploy:
      resources:
        limits:
          memory: 256m
    restart: always
    networks:
      default:
        aliases:
          - mongodb
    command: mongod --storageEngine wiredTiger --noscripting
    user: mongodb
    environment:
      TZ: Europe/Berlin
    logging:
      options:
        max-size: 50m

  oauth:
    image: ghcr.io/navikt/mock-oauth2-server:2.1.6
    cpus: 0.1
    mem_limit: 64m
    restart: always
    environment:
      PORT: 9900
      LOG_LEVEL: INFO
      JSON_CONFIG: |
          {
            "interactiveLogin": false,
            "httpServer": "NettyWrapper",
            "tokenCallbacks": [
              {
                "issuerId": "ditto",
                "tokenExpiry": 3600,
                "requestMappings": [
                  {
                    "requestParam": "grant_type",
                    "match": "*",
                    "claims": {
                      "sub": "ditto",
                      "aud": ["ditto"]
                    }
                  }
                ]
              }
            ]
          }
    networks:
      default:
        aliases:
          - oauth
    ports:
      - "9900:9900"
    logging:
      options:
        max-size: 10m

  policies:
    image: docker.io/eclipse/ditto-policies:${DITTO_VERSION:-latest}
    deploy:
      resources:
        limits:
          memory: 512m
    restart: always
    networks:
      default:
        aliases:
          - ditto-cluster
    environment:
      TZ: Europe/Berlin
      BIND_HOSTNAME: 0.0.0.0
      JAVA_TOOL_OPTIONS: >-
        -XX:ActiveProcessorCount=2
        -XX:+ExitOnOutOfMemoryError
        -XX:+UseContainerSupport
        -XX:+UseStringDeduplication
        -Xss512k
        -XX:MaxRAMPercentage=50
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=150
        -Dpekko.coordinated-shutdown.exit-jvm=on
        -Dpekko.cluster.shutdown-after-unsuccessful-join-seed-nodes=180s
        -Dpekko.cluster.failure-detector.threshold=15.0
        -Dpekko.cluster.failure-detector.expected-response-after=10s
        -Dpekko.cluster.failure-detector.acceptable-heartbeat-pause=20s
        -Dpekko.cluster.downing-provider-class=
      MONGO_DB_HOSTNAME: mongodb
    healthcheck:
      test: curl --fail `hostname`:7626/alive || exit 1
      interval: 30s
      timeout: 15s
      retries: 4
      start_period: 120s
    logging:
      options:
        max-size: 50m

  things:
    image: docker.io/eclipse/ditto-things:${DITTO_VERSION:-latest}
    deploy:
      resources:
        limits:
          memory: 512m
    restart: always
    networks:
      default:
        aliases:
          - ditto-cluster
    depends_on:
      - policies
    environment:
      TZ: Europe/Berlin
      BIND_HOSTNAME: 0.0.0.0
      JAVA_TOOL_OPTIONS: >-
        -XX:ActiveProcessorCount=2
        -XX:+ExitOnOutOfMemoryError
        -XX:+UseContainerSupport
        -XX:+UseStringDeduplication
        -Xss512k
        -XX:MaxRAMPercentage=50
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=150
        -Dpekko.coordinated-shutdown.exit-jvm=on
        -Dpekko.cluster.shutdown-after-unsuccessful-join-seed-nodes=180s
        -Dpekko.cluster.failure-detector.threshold=15.0
        -Dpekko.cluster.failure-detector.expected-response-after=10s
        -Dpekko.cluster.failure-detector.acceptable-heartbeat-pause=20s
        -Dpekko.cluster.downing-provider-class=
      MONGO_DB_HOSTNAME: mongodb
    healthcheck:
      test: curl --fail `hostname`:7626/alive || exit 1
      interval: 30s
      timeout: 15s
      retries: 4
      start_period: 120s
    logging:
      options:
        max-size: 50m

  gateway:
    image: docker.io/eclipse/ditto-gateway:${DITTO_VERSION:-latest}
    deploy:
      resources:
        limits:
          memory: 512m
    restart: always
    networks:
      default:
        aliases:
          - ditto-cluster
    depends_on:
      - policies
      - things
      - oauth
    # Direct host-port mapping for the gateway: no nginx in front of it.
    ports:
      - "${DITTO_EXTERNAL_PORT:-8080}:8080"
    environment:
      TZ: Europe/Berlin
      BIND_HOSTNAME: 0.0.0.0
      # Trust the `x-ditto-pre-authenticated` header sent directly by clients.
      # In a production setup this header would be set by an authenticated
      # reverse proxy (e.g. nginx). For this minimal example we let the client
      # send it itself to demonstrate the "basic auth" subject flow.
      ENABLE_PRE_AUTHENTICATION: "true"
      JAVA_TOOL_OPTIONS: >-
        -XX:ActiveProcessorCount=2
        -XX:+ExitOnOutOfMemoryError
        -XX:+UseContainerSupport
        -XX:+UseStringDeduplication
        -Xss512k
        -XX:MaxRAMPercentage=50
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=150
        -Dpekko.coordinated-shutdown.exit-jvm=on
        -Dpekko.cluster.shutdown-after-unsuccessful-join-seed-nodes=180s
        -Dpekko.cluster.failure-detector.threshold=15.0
        -Dpekko.cluster.failure-detector.expected-response-after=10s
        -Dpekko.cluster.failure-detector.acceptable-heartbeat-pause=20s
        -Dpekko.cluster.downing-provider-class=
        -Dditto.gateway.authentication.oauth.protocol=http
        -Dditto.gateway.authentication.oauth.openid-connect-issuers.ditto.issuer=oauth:9900/ditto
        -Dditto.gateway.authentication.oauth.openid-connect-issuers.ditto.auth-subjects.0="{{ jwt:sub }}"
    healthcheck:
      test: curl --fail `hostname`:7626/alive || exit 1
      interval: 30s
      timeout: 15s
      retries: 4
      start_period: 120s
    logging:
      options:
        max-size: 50m
