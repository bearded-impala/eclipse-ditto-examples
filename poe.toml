[tool.poe.tasks.e9-mock]
help = "Test JWT authentication with mock oauth server"
shell = """
docker run --rm \
  --network docker_default \
  -v $(pwd)/examples/9-jwt-auth/jwt_api_example.py:/app/jwt_api_example.py:ro \
  -v $(pwd)/examples/9-jwt-auth/policy.json:/app/policy.json:ro \
  -v $(pwd)/utils:/app/utils:ro \
  -e AUTH_TYPE=BEARER \
  -e JWT_ISSUER=oauth:9900 \
  -e JWT_SUBJECT=ditto \
  -e DITTO_HOST=nginx \
  -e DITTO_PORT=80 \
  -e DITTO_API_BASE=http://nginx/api/2 \
  -e PYTHONPATH=/app \
  python:3.11-slim \
  sh -c 'pip install -q httpx python-dotenv rich ditto-client microsoft-kiota-http && python /app/jwt_api_example.py'
"""

[tool.poe.tasks.e9-cognito]
help = "Test JWT authentication with cognito"
cwd = "examples/9-jwt-auth"
cmd = "python jwt_cognito_example.py"

# Example 10 - Variant A: pre-authenticated header
# Runs from the host - gateway is published on localhost:8080 by compose.
[tool.poe.tasks.e10-preauth]
help = "Example 10 / Variant A: pre-auth header (run after start-ditto-e10-preauth)"
cwd = "examples/10-direct-gateway-auth"
cmd = "python run-preauth.py"

# Example 10 - Variant B: external JWT
[tool.poe.tasks.e10-jwt]
help = "Example 10 / Variant B: external JWT (run after start-ditto-e10-jwt)"
cwd = "docker"
cmd = "docker compose -f docker-compose-e10-jwt.yml run --rm client"

[tool.poe.tasks.test-client]
help = "Eclipse-ditto operations using a python client"
cwd = "examples/9-python-client"
cmd = "python ditto_operations.py"

# Helpers

[tool.poe.tasks.ruff]
help = "Run all ruff operations: format, check, and fix"
sequence = [
    {cmd = "ruff check . --fix --unsafe-fixes"},
    {cmd = "ruff format ."},  # Format after fixes
    {cmd = "ruff check ."},   # Final check
]

[tool.poe.tasks.cleanup]
help = "Clean up all things, policies, and connections from Ditto"
cmd = "python cleanup.py"
