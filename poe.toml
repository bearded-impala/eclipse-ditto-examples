# Ditto

[tool.poe.tasks.start-ditto]
help = "Initialize Ditto locally"
cwd = "docker"
cmd = "docker compose -f docker-compose.yml --env-file ../.env up"

[tool.poe.tasks.stop-ditto]
help = "Shutdown local Ditto"
cwd = "docker"
cmd = "docker compose -f docker-compose.yml --env-file ../.env down"

[tool.poe.tasks.start-ditto-ferret]
help = "Initialize Ditto locally with ferretDB"
cwd = "docker"
cmd = "docker compose -f docker-compose-ferret.yml up"

[tool.poe.tasks.stop-ditto-ferret]
help = "Shutdown local Ditto with ferretDB"
cwd = "docker"
cmd = "docker compose -f docker-compose-ferret.yml down"

[tool.poe.tasks.start-ditto-e10-preauth]
help = "Start minimal Ditto for Example 10 - Variant A (pre-auth header)"
cwd = "docker"
cmd = "docker compose -f docker-compose-e10-preauth.yml up"

[tool.poe.tasks.stop-ditto-e10-preauth]
help = "Shutdown Example 10 - Variant A stack"
cwd = "docker"
cmd = "docker compose -f docker-compose-e10-preauth.yml down"

[tool.poe.tasks.start-ditto-e10-jwt]
help = "Start minimal Ditto + mock OAuth for Example 10 - Variant B (external JWT)"
cwd = "docker"
cmd = "docker compose -f docker-compose-e10-jwt.yml up"

[tool.poe.tasks.stop-ditto-e10-jwt]
help = "Shutdown Example 10 - Variant B stack"
cwd = "docker"
cmd = "docker compose -f docker-compose-e10-jwt.yml down"

# MQTT broker

[tool.poe.tasks.start-mqtt-broker]
help = "Starts Mosquitto MQTT Broker"
cwd = "examples/config/mosquitto"
sequence = [
    {cmd = "docker pull eclipse-mosquitto:openssl"},
    {cmd = "docker rm -f mosquitto-broker"},
    {cmd = "docker run -d --name mosquitto-broker -p 1883:1883 -p 9001:9001 eclipse-mosquitto:openssl"},
]

[tool.poe.tasks.stop-mqtt-broker]
help = "Stops Mosquitto MQTT Broker"
cmd = "docker rm -f mosquitto-broker"

